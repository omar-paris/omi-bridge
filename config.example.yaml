# omi-bridge — configuration multi-utilisateur
# Chaque webhook OMI arrive avec ?uid=<id OMI de l'utilisateur>.
# uid "*" = wildcard (attrape tout uid non listé — pratique en solo).

users:
  - uid: "*"
    name: Alex
    telegram_chat_id: 123456789  # chat Telegram qui reçoit les réponses
    triggers:
      - agent: omar
        label: "Allo Omar"
        # Variantes produites par la transcription française (Deepgram) :
        keywords:
          - "allo omar"
          - "allot omar"
          - "a l eau omar"
          - "hello omar"
          - "alau omar"
        # Args supplémentaires passés à `hermes chat` (optionnel)
        hermes_extra_args: []

context:
  # Nb de segments de conversation envoyés comme contexte à l'agent
  pre_trigger_segments: 25
  # Silence (secondes) qui clôt la commande vocale après le mot-clé
  command_silence_seconds: 6
  # Fenêtre (heures) pendant laquelle les commandes successives reprennent
  # la MÊME conversation hermes (--resume) au lieu d'en ouvrir une nouvelle
  session_resume_hours: 12

conversation:
  # « Allo <agent> conversation » ouvre le mode ; chaque pause de N secondes
  # déclenche une réponse conversationnelle (écoute active, même session hermes)
  pause_seconds: 10
  # Sortie automatique (avec récap) après N minutes sans paroles
  idle_timeout_minutes: 15
  # « Omar c'est parti » / « Aurel c'est parti » → exécution du plan accumulé
  launch_keywords: ["c est parti"]
  end_keywords: ["fin de conversation", "termine la conversation", "stop la conversation"]

security:
  # true = seuls les segments reconnus comme la voix du propriétaire (is_user,
  # profil vocal OMI entraîné dans l'app) peuvent déclencher ou alimenter.
  # Activer UNIQUEMENT après avoir vérifié que les segments réels arrivent
  # avec is_user=1, sinon tout est bloqué.
  require_user_voice: false

limits:
  # Anti-burst OA : jamais plus de N `hermes chat` simultanés
  max_concurrent_hermes: 2
  hermes_timeout_seconds: 240
